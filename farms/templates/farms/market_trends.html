{% extends 'base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <h1 class="display-5 fw-bold" data-nav="market_header">Market Price Analysis</h1>
            <p class="lead text-muted" data-nav="market_sub">Real-time APMC price trends for your region.</p>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="glass-card p-4 bg-white shadow-sm">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold mb-0" data-nav="price_chart_title">Price Forecast (Next 7 Days)</h5>
                    <span class="badge bg-success bg-opacity-10 text-success px-3">Live Sync</span>
                </div>
                <div style="height: 350px;">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="glass-card p-4 bg-white shadow-sm h-100">
                <h5 class="fw-bold mb-4" data-nav="live_rates">Live Market Rates</h5>
                
                <div class="d-flex justify-content-between align-items-center mb-3 p-3 rounded-4 bg-light border-start border-4 border-success">
                    <div>
                        <h6 class="fw-bold mb-0">Paddy (Basmati)</h6>
                        <small class="text-muted">per Quintal</small>
                    </div>
                    <div class="text-end">
                        <h6 class="fw-bold mb-0">₹2,850</h6>
                        <span class="text-success small fw-bold">+4.2% <i class="bi bi-graph-up"></i></span>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3 p-3 rounded-4 bg-light border-start border-4 border-warning">
                    <div>
                        <h6 class="fw-bold mb-0">Wheat</h6>
                        <small class="text-muted">per Quintal</small>
                    </div>
                    <div class="text-end">
                        <h6 class="fw-bold mb-0">₹2,125</h6>
                        <span class="text-danger small fw-bold">-1.5% <i class="bi bi-graph-down"></i></span>
                    </div>
                </div>

                <div class="d-grid mt-4">
                    <button class="btn btn-outline-success rounded-pill fw-bold">
                        <i class="bi bi-download me-2"></i> Download Report
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const ctx = document.getElementById('priceChart').getContext('2d');
    
    // Create a gradient for the chart area
    const gradient = ctx.createLinearGradient(0, 0, 0, 400);
    gradient.addColorStop(0, 'rgba(26, 77, 46, 0.4)');
    gradient.addColorStop(1, 'rgba(26, 77, 46, 0.0)');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['25 Mar', '26 Mar', '27 Mar', '28 Mar', '29 Mar', '30 Mar', '31 Mar'],
            datasets: [{
                label: 'Market Average (₹)',
                data: [2650, 2720, 2700, 2810, 2850, 2900, 2880],
                borderColor: '#1a4d2e',
                borderWidth: 3,
                backgroundColor: gradient,
                fill: true,
                tension: 0.4,
                pointRadius: 4,
                pointBackgroundColor: '#1a4d2e'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: false,
                    grid: { color: 'rgba(0,0,0,0.05)' }
                },
                x: {
                    grid: { display: false }
                }
            }
        }
    });
</script>
{% endblock %}
