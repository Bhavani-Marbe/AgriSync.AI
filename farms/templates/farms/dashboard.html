{% extends 'farms/base.html' %}
{% block content %}
<div class="container">
    <div class="d-flex justify-content-between mb-4">
        <h2 class="text-white">Your Virtual Farms</h2>
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addFarmModal">+ Add Farm</button>
    </div>

    <div class="row g-4">
        {% for farm in farms %}
        <div class="col-md-4">
            <div class="bento-card" style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px;">
                <h4 class="text-white">{{ farm.name }}</h4>
                <p class="text-muted small">{{ farm.intended_crop }}</p>
                <div class="mt-3">
                    <a href="{% url 'predict_crop' farm.id %}" class="btn btn-sm btn-outline-success w-100">Analyze Sync</a>
                </div>
            </div>
        </div>
        {% empty %}
        <p class="text-muted">No farms found. Add one to start syncing.</p>
        {% endfor %}
    </div>
</div>

{% endblock %}
